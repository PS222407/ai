services:
  postgres:
    build:
      context: ./dockorFiles
      dockerfile: Dockerfile.postgres
    restart: on-failure
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=postgres
      - PGDATA=/var/lib/postgresql/18/docker
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker

  # login (system: PostgreSQL, server: postgres, username: postgres, password: postgres, database: postgres)
  adminer:
    image: adminer
    restart: on-failure
    ports:
      - "8082:8080"

volumes:
  postgres_data:
    driver: local